<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UDF Viewer icon source (1024×1024)</title>
    <!--
      This file is the design reference for the icon set in src-tauri/icons/.
      The committed PNG / ICNS / ICO files (regenerated via `npm run tauri
      icon`) are the canonical artifacts and are what every build uses. This
      HTML records the layout / colors / weight that produced them so the
      look can be revisited or evolved later.

      The font-family stack below is system-UI deliberate; the wordmark's
      exact letter shapes will vary across operating systems (San Francisco
      on macOS, Segoe UI on Windows, etc.). That's an intentional trade
      against bundling a font binary — if you regenerate the icons on a
      different host, expect slightly different metrics, then run `npm run
      tauri icon` again and commit the new PNG / ICNS / ICO. The HTML is
      not the canonical source; the binaries are.
    -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
      }
      .icon {
        width: 1024px;
        height: 1024px;
        background: #0a4d8a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        font-weight: 700;
        color: #ffffff;
        font-size: 340px;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <div class="icon">UDF</div>
  </body>
</html>
