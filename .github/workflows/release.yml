name: Release

# Triggered when a semver tag is pushed (e.g. v0.1.0). Builds the Tauri app
# on each platform in parallel and uploads the artifacts to a draft GitHub
# Release named after the tag. Drafting (rather than auto-publishing) lets a
# human review the artifacts and notes before the release is visible.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both Apple Silicon and Intel targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry and target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux WebKit2GTK and AppImage prerequisites
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build and upload to draft Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "UDF Viewer ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for the release notes.

            **First-run security warnings**: these binaries are unsigned. Windows SmartScreen and macOS Gatekeeper will block them on the first launch — see the README for the per-platform unblock steps.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
