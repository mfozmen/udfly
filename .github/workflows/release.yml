name: Release

# Triggered when a semver tag is pushed (e.g. v1.0.0). The workflow uses
# the canonical Tauri two-job pattern: a single create-release job runs
# first and emits the draft Release id; the build-tauri matrix then
# depends on it via `needs:` so every platform leg uploads to the same
# releaseId. That alone eliminates the within-run upload race a single-job
# matrix would have. Cross-run races (a tag being re-pushed before the
# first run finishes) are handled separately by the concurrency block
# below.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

# A re-pushed tag (e.g., to fix a typo in a release commit before the draft
# is published) cancels the in-flight run for the same ref, so two runs
# never race the same draft Release.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create or replace the draft Release
        id: create
        uses: actions/github-script@v9
        with:
          # If a draft for this tag already exists from a previous (cancelled
          # or stale) run, delete it before recreating — that keeps repeated
          # tag pushes from accumulating leftover drafts. A non-draft (i.e.,
          # already-published) release is left alone and the workflow fails
          # loudly so we don't silently clobber a public release.
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // The catch is scoped to genuine API errors (specifically 404 =
            // no release for this tag). The classification (draft vs.
            // published) happens inside the try, but the *enforcement throw*
            // for the published case is hoisted past the catch, so the
            // refusal can't accidentally be swallowed by a future change to
            // how API errors are shaped or wrapped.
            let staleDraftId = null;
            let alreadyPublished = false;
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              if (existing.draft) {
                staleDraftId = existing.id;
              } else {
                alreadyPublished = true;
              }
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            if (alreadyPublished) {
              throw new Error(
                `Release for ${tag} is already published; refusing to overwrite.`
              );
            }
            if (staleDraftId !== null) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: staleDraftId,
              });
            }
            const { data: created } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Udfly ${tag}`,
              body: [
                `See [CHANGELOG.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${tag}/CHANGELOG.md) for the release notes.`,
                '',
                '**First-run security warnings**: these binaries are unsigned. Windows SmartScreen and macOS Gatekeeper will block them on the first launch — see the README for the per-platform unblock steps.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return created.id;

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      # Run the platform legs one at a time. tauri-action's updater step
      # uploads latest.json by reading the existing asset, merging this
      # platform's signature in, and re-uploading (delete + recreate).
      # Run in parallel, the three legs race that single shared asset: one
      # job deletes the asset another is mid-update on, which surfaces as
      # `Not Found - update-a-release-asset`, and the surviving latest.json
      # ends up with only whichever leg wrote last (v1.2.0's first attempt
      # left a Windows-only manifest and failed the Linux leg outright).
      # Serializing makes the read-merge-write safe; the cost is a longer
      # wall-clock release (~3x), acceptable for an infrequent job.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            # Restrict Windows to the NSIS installer; bundle.targets: "all"
            # would otherwise also produce a WiX MSI that the README install
            # table doesn't claim and most end users don't need.
            args: --bundles nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both Apple Silicon and Intel targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry and target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux WebKit2GTK and AppImage prerequisites
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build and upload to the draft Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required by tauri-plugin-updater: tauri-action passes these to
          # the bundler, which signs each platform artifact with the
          # private key and writes its base64 signature into latest.json.
          # The app verifies that signature against the pubkey baked into
          # tauri.conf.json before any update binary touches disk, so a
          # missing or wrong key here means no client can ever auto-update
          # from this release. Generated via `npx tauri signer generate`;
          # the public half lives in tauri.conf.json under
          # plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # tagName is required even with releaseId, because tauri-action's
          # uploadVersionJSON step uses it to construct the asset URLs in
          # the latest.json updater manifest. Without it, those URLs become
          # `…/releases/download//artifact.tar.gz` and silently break the
          # tauri-plugin-updater client.
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Publish latest.json so tauri-plugin-updater can read it from
          # the per-platform endpoint baked into tauri.conf.json.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # Tauri 2's NSIS bundler doesn't expose a portable mode, but the
      # raw target/release/udfly.exe Cargo produces is already a
      # self-contained Tauri binary (depends only on WebView2, which
      # ships with Windows 11 and modern Windows 10). Append it to the
      # draft Release the tauri-action step targeted so the install
      # table's portable row points at a real artifact.
      #
      # Upload via the GitHub Releases assets endpoint with the
      # release_id from the create-release job, NOT via `gh release
      # upload <tag>` — gh resolves the release by tag through an API
      # that returns published releases only and 404s on drafts (we
      # keep the release as a draft so a human reviews the artifacts
      # before publishing).
      - name: Upload portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT="Udfly_${VERSION}_x64-portable.exe"
          cp src-tauri/target/release/udfly.exe "$ARTIFACT"
          curl --fail --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/octet-stream" \
            --data-binary "@$ARTIFACT" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=$ARTIFACT"
