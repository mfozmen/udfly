name: Release

# Triggered when a semver tag is pushed (e.g. v1.0.0). The workflow uses the
# canonical Tauri two-job pattern so the draft Release is created exactly
# once before any matrix leg starts, avoiding a partial-upload mix when
# (1) a tag is re-pushed mid-build or (2) one platform's upload races
# another via cancel-in-progress.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

# A re-pushed tag (e.g., to fix a typo in a release commit before the draft
# is published) cancels the in-flight run for the same ref, so two runs
# never race the same draft Release.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create or replace the draft Release
        id: create
        uses: actions/github-script@v7
        with:
          # If a draft for this tag already exists from a previous (cancelled
          # or stale) run, delete it before recreating — that keeps repeated
          # tag pushes from accumulating leftover drafts. A non-draft (i.e.,
          # already-published) release is left alone and the workflow fails
          # loudly so we don't silently clobber a public release.
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // Only catch genuine API errors (specifically 404 = no release for
            // this tag). The published-vs-draft policy is enforced AFTER the
            // try/catch so the refusal can't accidentally be swallowed by a
            // future change to how API errors are shaped or wrapped.
            let staleDraftId = null;
            let alreadyPublished = false;
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              if (existing.draft) {
                staleDraftId = existing.id;
              } else {
                alreadyPublished = true;
              }
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            if (alreadyPublished) {
              throw new Error(
                `Release for ${tag} is already published; refusing to overwrite.`
              );
            }
            if (staleDraftId !== null) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: staleDraftId,
              });
            }
            const { data: created } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `UDF Viewer ${tag}`,
              body: [
                `See [CHANGELOG.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${tag}/CHANGELOG.md) for the release notes.`,
                '',
                '**First-run security warnings**: these binaries are unsigned. Windows SmartScreen and macOS Gatekeeper will block them on the first launch — see the README for the per-platform unblock steps.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            return created.id;

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both Apple Silicon and Intel targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry and target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux WebKit2GTK and AppImage prerequisites
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Build and upload to the draft Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tagName is required even with releaseId, because tauri-action's
          # uploadVersionJSON step uses it to construct the asset URLs in
          # the latest.json updater manifest. Without it, those URLs become
          # `…/releases/download//artifact.tar.gz` and silently break any
          # future tauri-plugin-updater integration.
          tagName: ${{ github.ref_name }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
