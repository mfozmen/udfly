<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f0e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1916" media="(prefers-color-scheme: dark)" />
    <title>Udfly</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
  </head>

  <body>
    <header class="topbar">
      <div class="topbar__brand">
        <img
          class="topbar__mark"
          src="./mark-only.png"
          alt=""
          aria-hidden="true"
          width="22"
          height="22"
        />
        <h1 class="topbar__title" translate="no">udfly</h1>
      </div>
      <div class="topbar__filename" id="filename" aria-live="polite"></div>
      <div class="topbar__actions">
        <button
          class="btn"
          id="open-btn"
          type="button"
          aria-keyshortcuts="Control+O"
        >
          Open
        </button>
        <div class="topbar__export">
          <button
            class="btn"
            id="export-btn"
            type="button"
            disabled
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="export-menu"
          >
            Export
          </button>
          <ul class="dropdown-menu" id="export-menu" role="menu" hidden>
            <li role="none">
              <button
                class="dropdown-menu__item"
                id="export-txt"
                type="button"
                role="menuitem"
              >
                Export as TXT
              </button>
            </li>
            <li role="none">
              <button
                class="dropdown-menu__item"
                id="export-html"
                type="button"
                role="menuitem"
              >
                Export as HTML
              </button>
            </li>
          </ul>
        </div>
        <button
          class="btn btn--separator-before"
          id="print-btn"
          type="button"
          disabled
          aria-keyshortcuts="Control+P"
        >
          Print
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <section class="state state--empty" id="empty-state" aria-label="No document">
        <div class="empty">
          <img
            class="empty__mark empty__mark--light"
            src="./mark-light.png"
            alt=""
            aria-hidden="true"
            width="88"
            height="88"
          />
          <img
            class="empty__mark empty__mark--dark"
            src="./mark-dark.png"
            alt=""
            aria-hidden="true"
            width="88"
            height="88"
          />
          <h2 class="empty__title">Drop a .udf file to begin</h2>
          <p class="empty__hint">
            or press
            <kbd class="kbd">Ctrl</kbd>
            <kbd class="kbd">O</kbd>
            to open
          </p>
        </div>
      </section>

      <section
        class="state state--page"
        id="page-view"
        aria-label="Document"
        hidden
      >
        <article class="page" id="page"></article>
      </section>

      <section
        class="state state--error"
        id="error-state"
        aria-label="Error"
        hidden
      >
        <div class="error">
          <div class="error__rule" aria-hidden="true"></div>
          <h2 class="error__title">Couldn’t open this file</h2>
          <p class="error__message" id="error-message"></p>
          <button class="btn error__retry" id="error-retry" type="button">
            Try another file
          </button>
        </div>
      </section>

      <div class="dropoverlay" id="dropoverlay" aria-hidden="true">
        <div class="dropoverlay__inner">Release to open</div>
      </div>
    </main>

    <footer class="statusbar" aria-label="Document properties">
      <div class="statusbar__item">
        <span class="statusbar__label">Pages</span>
        <span class="statusbar__value" id="pages-info">—</span>
      </div>
      <span class="statusbar__sep" aria-hidden="true"></span>
      <div class="statusbar__item">
        <span class="statusbar__label">Size</span>
        <span class="statusbar__value" id="size-info">—</span>
      </div>
      <span class="statusbar__sep" aria-hidden="true"></span>
      <div class="statusbar__item">
        <span class="statusbar__label">Verification</span>
        <span class="statusbar__value statusbar__value--mono" id="verification-info">—</span>
      </div>
    </footer>
  </body>
</html>
