<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3f0e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1916" media="(prefers-color-scheme: dark)" />
    <title>Udfly</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./main.js" defer></script>
  </head>

  <body>
    <header class="topbar">
      <div class="topbar__brand">
        <img
          class="topbar__mark"
          src="./mark-only.png"
          alt=""
          aria-hidden="true"
          width="22"
          height="22"
        />
        <h1 class="topbar__title" translate="no">udfly</h1>
      </div>
      <div class="topbar__filename" id="filename" aria-live="polite"></div>
      <div class="topbar__actions">
        <button
          class="btn"
          id="open-btn"
          type="button"
          aria-keyshortcuts="Control+O"
          data-i18n="topbar.open"
          data-i18n-aria-label="topbar.open.aria"
        >
          Aç
        </button>
        <div class="topbar__export">
          <button
            class="btn"
            id="export-btn"
            type="button"
            disabled
            aria-haspopup="menu"
            aria-expanded="false"
            aria-controls="export-menu"
            data-i18n="topbar.export"
          >
            Dışa Aktar
          </button>
          <ul class="dropdown-menu" id="export-menu" role="menu" hidden>
            <li role="none">
              <button
                class="dropdown-menu__item"
                id="export-txt"
                type="button"
                role="menuitem"
                data-i18n="topbar.export.txt"
              >
                TXT Olarak Dışa Aktar
              </button>
            </li>
            <li role="none">
              <button
                class="dropdown-menu__item"
                id="export-html"
                type="button"
                role="menuitem"
                data-i18n="topbar.export.html"
              >
                HTML Olarak Dışa Aktar
              </button>
            </li>
            <li role="none">
              <button
                class="dropdown-menu__item"
                id="export-pdf"
                type="button"
                role="menuitem"
                data-i18n="topbar.export.pdf"
              >
                PDF Olarak Dışa Aktar
              </button>
            </li>
          </ul>
        </div>
        <button
          class="btn btn--separator-before"
          id="print-btn"
          type="button"
          disabled
          aria-keyshortcuts="Control+P"
          data-i18n="topbar.print"
          data-i18n-aria-label="topbar.print.aria"
        >
          Yazdır
        </button>
        <button
          class="lang-toggle btn--separator-before"
          id="lang-toggle"
          type="button"
          data-i18n-aria-label="topbar.lang.toggle.aria"
          translate="no"
        >
          <span class="lang-toggle__option" data-locale="tr">TR</span>
          <span class="lang-toggle__sep" aria-hidden="true">|</span>
          <span class="lang-toggle__option" data-locale="en">EN</span>
        </button>
      </div>
    </header>

    <main class="content" id="content">
      <section class="state state--empty" id="empty-state" data-i18n-aria-label="state.empty.aria" aria-label="Belge yok">
        <div class="empty">
          <img
            class="empty__mark empty__mark--light"
            src="./mark-light.png"
            alt=""
            aria-hidden="true"
            width="88"
            height="88"
          />
          <img
            class="empty__mark empty__mark--dark"
            src="./mark-dark.png"
            alt=""
            aria-hidden="true"
            width="88"
            height="88"
          />
          <h2 class="empty__title" data-i18n="empty.title">Başlamak için bir .udf dosyası bırakın</h2>
          <p class="empty__hint">
            <span data-i18n="empty.hint.prefix">veya açmak için</span>
            <kbd class="kbd" translate="no">Ctrl</kbd>
            <kbd class="kbd" translate="no">O</kbd>
            <span data-i18n="empty.hint.suffix">tuşlarına basın</span>
          </p>
        </div>
      </section>

      <section
        class="state state--page"
        id="page-view"
        data-i18n-aria-label="state.page.aria"
        aria-label="Belge"
        hidden
      >
        <article class="page" id="page"></article>
      </section>

      <section
        class="state state--error"
        id="error-state"
        data-i18n-aria-label="state.error.aria"
        aria-label="Hata"
        hidden
      >
        <div class="error">
          <div class="error__rule" aria-hidden="true"></div>
          <h2 class="error__title" data-i18n="error.title">Bu dosya açılamadı</h2>
          <p class="error__message" id="error-message"></p>
          <button class="btn error__retry" id="error-retry" type="button" data-i18n="error.retry">
            Başka bir dosya deneyin
          </button>
        </div>
      </section>

      <div class="dropoverlay" id="dropoverlay" aria-hidden="true">
        <div class="dropoverlay__inner" data-i18n="drop.release">Açmak için bırakın</div>
      </div>
    </main>

    <footer class="statusbar" data-i18n-aria-label="statusbar.aria" aria-label="Belge özellikleri">
      <div class="statusbar__item">
        <span class="statusbar__label" data-i18n="statusbar.pages">Sayfa</span>
        <span class="statusbar__value" id="pages-info">—</span>
      </div>
      <span class="statusbar__sep" aria-hidden="true"></span>
      <div class="statusbar__item">
        <span class="statusbar__label" data-i18n="statusbar.size">Boyut</span>
        <span class="statusbar__value" id="size-info">—</span>
      </div>
      <span class="statusbar__sep" aria-hidden="true"></span>
      <div class="statusbar__item">
        <span class="statusbar__label" data-i18n="statusbar.verification">Doğrulama</span>
        <span class="statusbar__value statusbar__value--mono" id="verification-info">—</span>
      </div>
    </footer>
  </body>
</html>
